<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14213d">
  <title>TB Admin Portal</title>
  <link rel="manifest" href="/admin_portal-manifest.webmanifest">
  <link rel="icon" href="/static/employee-portal-icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #14213d;
      --muted: #6f6a63;
      --line: rgba(20, 33, 61, 0.12);
      --panel: rgba(255, 252, 247, 0.94);
      --shadow: 0 18px 40px rgba(20, 33, 61, 0.14);
      --blue: #2667ff;
      --green: #2a9d5b;
      --gold: #f2b632;
      --red: #cf3f3f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(242, 182, 50, 0.24), transparent 30%),
        radial-gradient(circle at top right, rgba(38, 103, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #fbf7f0 0%, #f4efe6 55%, #efe6da 100%);
      padding: 14px 12px 92px;
    }
    .shell {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero, .login-card {
      padding: 16px;
    }
    .hero {
      position: sticky;
      top: 8px;
      z-index: 10;
      padding: 12px 14px;
    }
    .brand-lockup {
      width: 118px;
      display: block;
      margin: 0;
    }
    .brand-lockup img {
      width: 100%;
      display: block;
      height: auto;
    }
    .subcopy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
    }
    button, .text-btn {
      border: 0;
      cursor: pointer;
      font-family: inherit;
    }
    .text-btn, .icon-btn, .primary-btn {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 42px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .primary-btn {
      background: var(--ink);
      color: #fff;
      border-color: transparent;
    }
    .icon-btn {
      width: 42px;
      min-width: 42px;
      padding: 0;
      font-size: 16px;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
    }
    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      min-height: 64px;
      padding: 8px 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .tab-btn.active {
      background: rgba(38, 103, 255, 0.08);
      border-color: rgba(38, 103, 255, 0.35);
      box-shadow: 0 10px 24px rgba(20, 33, 61, 0.1);
      transform: translateY(-1px);
    }
    .tab-icon {
      font-size: 18px;
      line-height: 1;
    }
    .tab-label {
      font-size: 11px;
      font-weight: 800;
      line-height: 1.05;
    }
    .iframe-card {
      overflow: hidden;
      padding: 0;
    }
    .viewer-toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .viewer-frame {
      width: 100%;
      height: calc(100vh - 190px);
      min-height: 560px;
      border: 0;
      background: #fff;
      display: block;
    }
    .login-card {
      max-width: 460px;
      margin: 10vh auto 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-card h1 { font-size: 32px; }
    .hero-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-field {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      padding: 16px;
      outline: none;
    }
    .error {
      font-size: 13px;
      color: var(--red);
      font-weight: 700;
    }
    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 40;
      background: rgba(255, 252, 247, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .bottom-nav-btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      min-height: 58px;
      padding: 7px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .bottom-nav-btn.active {
      background: rgba(38, 103, 255, 0.08);
      border-color: rgba(38, 103, 255, 0.35);
      box-shadow: 0 10px 24px rgba(20, 33, 61, 0.1);
      transform: translateY(-1px);
    }
    .bottom-nav .tab-icon {
      font-size: 17px;
    }
    .bottom-nav .tab-label {
      font-size: 10px;
    }
    @media (max-width: 640px) {
      .viewer-frame { height: calc(100vh - 180px); min-height: 500px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    {% if view == 'login' %}
      <form class="login-card card" method="post">
        <a class="brand-lockup" href="#">
          <img src="/static/tickbags-logo.png" alt="TickBags logo">
        </a>
        <h1>Admin mobile.</h1>
        <p class="subcopy">Password-protected mobile admin access.</p>
        {% if login_error %}
          <div class="error">{{ login_error }}</div>
        {% endif %}
        <input class="login-field" type="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <button class="primary-btn" type="submit">Enter Admin Portal</button>
      </form>
    {% else %}
      <section class="hero card">
        <div class="hero-topline">
          <button class="brand-lockup" type="button" id="logoHomeBtn" style="background:none;border:none;padding:0;cursor:pointer;">
            <img src="/static/tickbags-logo.png" alt="TickBags logo">
          </button>
          <div class="hero-actions">
            <button class="icon-btn" type="button" id="addOrderBtn" title="Add Order">＋</button>
            <form method="post" action="/admin_portal/logout" style="margin:0;">
              <button class="icon-btn" type="submit" title="Logout">⎋</button>
            </form>
          </div>
        </div>
      </section>

      <section class="card iframe-card">
        <iframe id="toolFrame" class="viewer-frame" title="Admin portal tool view" src=""></iframe>
      </section>

      <nav class="bottom-nav" id="tabGrid" aria-label="Admin navigation">
        {% for section in sections %}
          <button
            class="bottom-nav-btn{% if section.id == selected_section %} active{% endif %}"
            type="button"
            data-section="{{ section.id }}"
            data-src="{{ section.src }}"
            data-label="{{ section.label }}"
          >
            <span class="tab-icon">{{ section.icon }}</span>
            <span class="tab-label">{{ section.label }}</span>
          </button>
        {% endfor %}
      </nav>
    {% endif %}
  </div>

  {% if view == 'portal' %}
    <script>
      const sections = {{ sections|tojson }};
      const defaultSection = {{ selected_section|tojson }};
      const toolFrame = document.getElementById('toolFrame');
      const logoHomeBtn = document.getElementById('logoHomeBtn');
      const addOrderBtn = document.getElementById('addOrderBtn');

      function getSectionById(id) {
        return sections.find(section => section.id === id) || sections[0];
      }

      function updateActiveTab(sectionId) {
        document.querySelectorAll('.bottom-nav-btn').forEach(button => {
          button.classList.toggle('active', button.dataset.section === sectionId);
        });
      }

      function openSection(sectionId, persist = true) {
        const section = getSectionById(sectionId);
        toolFrame.src = section.src;
        updateActiveTab(section.id);
        if (persist) {
          localStorage.setItem('tbAdminPortalSection', section.id);
          history.replaceState(null, '', `/admin_portal?section=${encodeURIComponent(section.id)}`);
        }
      }

      document.querySelectorAll('.bottom-nav-btn').forEach(button => {
        button.addEventListener('click', () => openSection(button.dataset.section));
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/admin_portal-sw.js').catch(() => {});
      }

      logoHomeBtn?.addEventListener('click', () => openSection('dashboard'));
      addOrderBtn?.addEventListener('click', () => {
        openSection('employee-orders');
        window.setTimeout(() => {
          toolFrame.src = '/employee_portal/orders?show_add_order=1';
        }, 40);
      });

      const remembered = localStorage.getItem('tbAdminPortalSection');
      openSection(remembered || defaultSection, false);
    </script>
  {% endif %}
</body>
</html>
