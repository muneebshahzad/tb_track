{% extends 'base.html' %}
{% block title %}TB Track – Scan Orders{% endblock %}

{% block content %}
<style>
  .scan-mode-btn { display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:12px; border:1px solid #e3e6f0; background:#fff; cursor:pointer; text-align:left; transition:all 0.18s; box-shadow:0 1px 4px rgba(0,0,0,0.05); font-family:'DM Sans',sans-serif; width:100%; }
  .scan-mode-btn:hover { box-shadow:0 4px 18px rgba(78,115,223,0.15); }
  .scan-input-bar { background:#fff; border-radius:12px; border:1px solid #e3e6f0; padding:14px 16px; margin-bottom:14px; display:flex; gap:8px; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
  .scan-input-bar input { flex:1; border:none; outline:none; font-size:13px; color:#3a3b45; font-family:'DM Sans',sans-serif; background:transparent; }
  .scan-list-item { background:#fff; border-radius:9px; border:1px solid #e3e6f0; padding:10px 14px; display:flex; align-items:center; gap:10px; }
</style>

<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
  <div class="topbar">
    <button id="backBtn" onclick="goHome()" style="display:none;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1.5px solid #e3e6f0;background:none;cursor:pointer;font-size:12px;color:#858796;font-family:'DM Sans',sans-serif;">← Back</button>
    <span class="topbar-title" id="topbarTitle">Scan Orders</span>
    <span id="topbarSub" style="font-size:12px;color:#858796;display:none;"></span>
  </div>

  <div style="flex:1;overflow:auto;padding:20px;">

    <!-- Home -->
    <div id="homeView" style="max-width:500px;margin:40px auto;display:flex;flex-direction:column;gap:12px;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:36px;margin-bottom:6px;">📱</div>
        <div style="font-size:17px;font-weight:700;color:#3a3b45;">Order Scanner</div>
        <div style="font-size:12px;color:#858796;margin-top:3px;">Select a mode to get started</div>
      </div>
      <button class="scan-mode-btn" onclick="startMode('Search','#4e73df')" id="btnSearch">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(78,115,223,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🔍</div>
        <div><div style="font-size:14px;font-weight:700;color:#3a3b45;">Search Order</div><div style="font-size:12px;color:#858796;margin-top:2px;">Look up any order by ID or tracking number</div></div>
        <div style="margin-left:auto;color:#858796;font-size:16px;">›</div>
      </button>
      <button class="scan-mode-btn" onclick="startMode('Dispatch','#1cc88a')" id="btnDispatch">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(28,200,138,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🚛</div>
        <div><div style="font-size:14px;font-weight:700;color:#3a3b45;">Scan for Dispatch</div><div style="font-size:12px;color:#858796;margin-top:2px;">Build a dispatch list and generate loadsheet</div></div>
        <div style="margin-left:auto;color:#858796;font-size:16px;">›</div>
      </button>
      <button class="scan-mode-btn" onclick="startMode('Return','#e74a3b')" id="btnReturn">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(231,74,59,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">↩</div>
        <div><div style="font-size:14px;font-weight:700;color:#3a3b45;">Scan for Return</div><div style="font-size:12px;color:#858796;margin-top:2px;">Build a return list and apply return tags</div></div>
        <div style="margin-left:auto;color:#858796;font-size:16px;">›</div>
      </button>
    </div>

    <!-- Scanning view -->
    <div id="scanView" style="display:none;max-width:760px;margin:0 auto;">
      <div class="scan-input-bar">
        <span style="font-size:18px;">📷</span>
        <input id="scanInput" placeholder="Scan barcode or type order ID / tracking number…" onkeydown="if(event.key==='Enter')doScan()" autofocus/>
        <button id="scanActionBtn" onclick="doScan()" class="btn btn-primary" style="flex-shrink:0;">+ Add</button>
      </div>

      <!-- Search result -->
      <div id="searchResult" style="display:none;background:#fff;border-radius:12px;border:2px solid #1cc88a;padding:14px 16px;margin-bottom:14px;"></div>

      <!-- List mode -->
      <div id="listSection" style="display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:600;color:#3a3b45;" id="listTitle">Dispatch List (0)</div>
          <button id="generateBtn" onclick="generateReport()" style="display:none;padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;color:#fff;">Generate Report</button>
        </div>
        <div id="emptyListMsg" style="text-align:center;padding:36px 0;color:#858796;font-size:13px;background:#fff;border-radius:12px;border:1px dashed #e3e6f0;">Scan your first order to get started</div>
        <div id="scanListEl" style="display:flex;flex-direction:column;gap:5px;"></div>
      </div>
    </div>

  </div>
</div>

<!-- Feedback toast (scan-specific) -->
<div id="scanFeedback" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,0.2);z-index:10000;"></div>
{% endblock %}

{% block extra_js %}
<script>
const ORDER_DATA = {{ order_details | tojson }};

let scanMode = '';
let scanList = [];
let modeColor = '#4e73df';

function startMode(mode, color) {
  scanMode = mode; modeColor = color; scanList = [];
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('scanView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'flex';
  document.getElementById('topbarTitle').textContent = mode + ' Mode';
  document.getElementById('topbarSub').style.display = 'inline';
  document.getElementById('topbarSub').textContent = '— 0 scanned';

  const actionBtn = document.getElementById('scanActionBtn');
  if (mode === 'Search') {
    actionBtn.textContent = '🔍 Search';
    document.getElementById('listSection').style.display = 'none';
    document.getElementById('searchResult').style.display = 'none';
  } else {
    actionBtn.textContent = '+ Add';
    document.getElementById('listSection').style.display = 'block';
    document.getElementById('searchResult').style.display = 'none';
    const genBtn = document.getElementById('generateBtn');
    genBtn.style.background = color;
    genBtn.textContent = 'Generate ' + mode + ' Report';
    renderList();
  }
  setTimeout(() => document.getElementById('scanInput').focus(), 200);
}

function goHome() {
  document.getElementById('homeView').style.display = 'flex';
  document.getElementById('scanView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('topbarTitle').textContent = 'Scan Orders';
  document.getElementById('topbarSub').style.display = 'none';
  scanList = []; scanMode = '';
}

function findOrder(term) {
  const t = term.trim().toLowerCase().replace('#','');
  return ORDER_DATA.find(o =>
    o.order_id === t || o.order_id.toLowerCase().endsWith(t) ||
    (o.line_items||[]).some(i => (i.tracking_number||'').toLowerCase() === t)
  ) || null;
}

function doScan() {
  const input = document.getElementById('scanInput');
  const term = input.value.trim();
  if (!term) return;
  input.value = '';

  if (scanMode === 'Search') {
    const o = findOrder(term);
    if (!o) { showScanFeedback('Order not found!', false); return; }
    const sr = document.getElementById('searchResult');
    sr.style.display = 'block';
    const totalPcs = (o.line_items||[]).reduce((s,i)=>s+i.quantity,0);
    sr.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:14px;font-weight:700;color:#4e73df;font-family:'DM Mono',monospace;">#${o.order_id}</span>
        <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:#dde4fb;color:#2346a8;">${o.status}</span>
        <span style="margin-left:auto;font-size:13px;font-weight:700;color:#3a3b45;">Rs ${Number(o.total_price||0).toLocaleString('en-PK')}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${(o.line_items||[]).map(item=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f8f9fc;border-radius:7px;">
            <div style="width:34px;height:34px;border-radius:5px;background:#e3e6f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#858796;overflow:hidden;flex-shrink:0;">
              ${item.image_src && item.image_src!=='None' ? `<img src="${item.image_src}" style="width:100%;height:100%;object-fit:cover;">` : 'IMG'}
            </div>
            <div><div style="font-size:12px;font-weight:600;color:#3a3b45;">${item.product_title}</div><div style="font-size:11px;color:#858796;">Qty: ${item.quantity}</div></div>
          </div>`).join('')}
      </div>`;
    return;
  }

  const o = findOrder(term);
  if (!o) { showScanFeedback('Order not found!', false); return; }
  if (scanList.some(x => x.order_id === o.order_id)) { showScanFeedback('Duplicate order!', false); return; }
  scanList.unshift(o);
  showScanFeedback('Added: #' + o.order_id, true);
  renderList();
  setTimeout(() => document.getElementById('scanInput').focus(), 100);
}

function renderList() {
  const el = document.getElementById('scanListEl');
  const empty = document.getElementById('emptyListMsg');
  const genBtn = document.getElementById('generateBtn');
  const title = document.getElementById('listTitle');
  title.textContent = scanMode + ' List (' + scanList.length + ')';
  document.getElementById('topbarSub').textContent = '— ' + scanList.length + ' scanned';
  genBtn.style.display = scanList.length > 0 ? 'block' : 'none';
  empty.style.display = scanList.length === 0 ? 'block' : 'none';
  el.innerHTML = scanList.map((o, i) => {
    const totalPcs = (o.line_items||[]).reduce((s,it)=>s+it.quantity,0);
    return `<div class="scan-list-item">
      <div style="width:26px;height:26px;border-radius:6px;background:rgba(78,115,223,0.1);color:#4e73df;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${i+1}</div>
      <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#4e73df;">#${o.order_id}</span>
      <span style="flex:1;font-size:11px;color:#858796;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(o.line_items||[]).map(it=>it.product_title).join(', ')}</span>
      <span style="font-size:12px;font-weight:600;color:#3a3b45;">${totalPcs} pcs</span>
      <button onclick="removeFromList('${o.order_id}')" style="width:20px;height:20px;border-radius:50%;border:none;background:#fce8e6;color:#e74a3b;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">×</button>
    </div>`;
  }).join('');
}

function removeFromList(orderId) {
  scanList = scanList.filter(o => o.order_id !== orderId);
  renderList();
}

function generateReport() {
  if (scanList.length === 0) return;
  if (scanMode === 'Dispatch') {
    const cnNumbers = scanList.flatMap(o => (o.line_items||[]).map(i=>i.tracking_number).filter(cn=>cn&&cn!=='N/A'));
    if (!cnNumbers.length) { showToast('No tracking numbers found'); return; }
    fetch('/generate_loadsheet', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cn_numbers: cnNumbers })
    }).then(r=>r.json()).then(d=>{
      if (d.error) showToast('Error: '+d.error);
      else { showToast('Loadsheet generated for '+scanList.length+' orders'); scanList=[]; renderList(); }
    }).catch(()=>showToast('Failed to generate loadsheet'));
  } else {
    scanList.forEach(o => {
      fetch('/apply_tag',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:o.id,tag:'Returned'})}).catch(()=>{});
    });
    showToast('Applied Return tag to '+scanList.length+' orders');
    scanList=[]; renderList();
  }
}

function showScanFeedback(msg, success) {
  const el = document.getElementById('scanFeedback');
  el.style.background = success ? '#1cc88a' : '#e74a3b';
  el.textContent = (success?'✓ ':'✕ ') + msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.style.display='none', 2000);
}
</script>
{% endblock %}
